llm:
  provider: groq                          # groq | google | ollama (used for generation)
  fast_provider: google                   # provider for grader / hallucination check / rewriter
  generation_model: llama-3.3-70b-versatile
  fast_model: gemini-2.5-flash            # Gemini 2.5 Flash — strong at structured judgment
  temperature: 0.0
  max_tokens: 2048
  ollama_base_url: http://localhost:11434

embedding:
  model: all-MiniLM-L6-v2
  device: cpu                             # cpu | cuda | mps

vector_store:
  collection_name: hybrid_rag_docs
  persist_directory: ./data/vectorstore
  top_k: 6

graph_store:
  allowed_nodes:
    - Company
    - Person
    - Metric
    - Product
    - Organization
    - Location
    - Date
    - Event
  allowed_relationships:
    - REPORTS
    - EMPLOYS
    - MENTIONS
    - LOCATED_IN
    - OWNED_BY
    - PRODUCED_BY
    - RELATES_TO
    - FILED_BY
    - COMPETES_WITH

chunker:
  chunk_size: 1000
  chunk_overlap: 150

agent:
  max_iterations: 3

web_search:
  max_results: 3
  auto_ingest: false                      # self-heal web results into Neo4j (slow; doubles LLM cost per fallback)
